<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Math Proxy Client</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>Cliente Web - Fibonacci vía Proxy</h1>

<form onsubmit="return false;">
	<label for="terms">Número de términos (n):</label><br>
	<input type="number" id="terms" name="terms" value="10" min="1"><br><br>
	<input type="button" value="Calcular" onclick="loadFibonacci()">
</form>

<h2>Resultado</h2>
<pre id="result"></pre>

<script>
	function loadFibonacci() {
		var terms = document.getElementById("terms").value;
		var xhttp = new XMLHttpRequest();
		xhttp.onload = function () {
			if (this.status === 200) {
				document.getElementById("result").textContent = this.responseText;
			} else {
				document.getElementById("result").textContent = "Error: " + this.status + " - " + this.responseText;
			}
		};
		xhttp.open("GET", "/api/fibonacci?terms=" + encodeURIComponent(terms));
		xhttp.send();
	}
</script>

</body>
</html>
